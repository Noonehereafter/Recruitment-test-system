<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input[type="email"] { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
    button { padding: 8px 15px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 4px;}
    button:hover { background: #2980b9; }
    textarea { width: 100%; height: 300px; margin-top: 10px; box-sizing: border-box; padding: 10px; font-family: monospace; white-space: pre-wrap;}
    #loading { color: #f39c12; font-style: italic; display: none; }
  </style>
</head>
<body>
  <label for="emailInput">Nhập email ứng viên:</label>
  <input type="email" id="emailInput" placeholder="VD: ungvien@example.com">
  <button onclick="fetchData()">Lấy dữ liệu</button>
  <span id="loading"> Đang lấy dữ liệu...</span>

  <br>
  <textarea id="resultTextarea" placeholder="Kết quả sẽ hiển thị ở đây để bạn Copy đưa vào AI..." readonly></textarea>
  <button onclick="copyData()" style="margin-top: 10px; background: #2ecc71;">Copy Kết Quả</button>

  <script>
    function fetchData() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) {
        alert("Vui lòng nhập email.");
        return;
      }

      document.getElementById('loading').style.display = 'inline';
      document.getElementById('resultTextarea').value = "";

      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultTextarea').value = res;
      }).generateExportData(email);
    }

    function copyData() {
      const txt = document.getElementById('resultTextarea');
      txt.select();
      document.execCommand('copy');
      alert('Đã copy dữ liệu!');
    }
  </script>
</body>
</html>
