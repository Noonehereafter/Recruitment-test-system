<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --secondary: #10B981;
      --bg: #F9FAFB;
      --surface: #FFFFFF;
      --text: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --radius: 12px;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); padding: 25px; margin: 0; color: var(--text); }
    h2 { margin-top: 0; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 20px;}
    label { font-weight: 500; color: var(--text-muted); font-size: 14px; margin-bottom: 8px; display: block; }
    
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    
    input[type="email"] { 
      flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); 
      border-radius: 10px; font-family: 'Outfit', sans-serif; outline: none; transition: 0.3s;
      font-size: 14px; background: var(--surface);
    }
    input[type="email"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15); }
    
    button { 
      padding: 12px 20px; background: var(--primary); color: white; border: none; 
      cursor: pointer; border-radius: 10px; font-weight: 600; font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease; font-size: 14px; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
      white-space: nowrap; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 12px rgba(79, 70, 229, 0.25); }
    button:active { transform: translateY(0); }
    
    button.success { background: var(--secondary); box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); width: 100%; margin-top: 15px;}
    button.success:hover { background: #059669; box-shadow: 0 6px 12px rgba(16, 185, 129, 0.25); }
    
    textarea { 
      width: 100%; height: 260px; box-sizing: border-box; 
      padding: 16px; font-family: 'Consolas', monospace; white-space: pre-wrap;
      border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface);
      font-size: 13px; line-height: 1.6; color: var(--text); resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    
    #loading { 
      display: none; align-items: center; justify-content: center; gap: 8px; color: var(--primary); 
      font-size: 14px; font-weight: 500; margin-bottom: 15px; 
    }
    
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(79, 70, 229, 0.2); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .card { background: var(--surface); padding: 24px; border-radius: 16px; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  </style>
</head>
<body>
  
  <div class="card">
    <h2>Trích xuất Dữ liệu</h2>
    <label for="emailInput">Email ứng viên</label>
    <div class="input-group">
      <input type="email" id="emailInput" placeholder="VD: ungvien@example.com">
      <button onclick="fetchData()">Trích xuất</button>
    </div>
    
    <div id="loading">
      <div class="spinner"></div> Đang thu thập dữ liệu...
    </div>
    
    <textarea id="resultTextarea" placeholder="Kết quả thô sẽ hiển thị ở đây để bạn Copy đưa vào AI phân tích..." readonly></textarea>
    
    <button class="success" onclick="copyData()" id="copyBtn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
      Copy Kết Quả
    </button>
  </div>

  <script>
    function fetchData() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) {
        alert("Vui lòng nhập email.");
        return;
      }
      
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('resultTextarea').value = "";
      
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultTextarea').value = res;
      }).generateExportData(email);
    }
    
    function copyData() {
      const txt = document.getElementById('resultTextarea');
      if (!txt.value) return;
      
      txt.select();
      document.execCommand('copy');
      
      const btn = document.getElementById('copyBtn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = 'Đã copy thành công ✓';
      
      setTimeout(() => {
        btn.innerHTML = originalHTML;
      }, 2000);
    }
  </script>
</body>
</html>
