<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

:root {
  --primary: #4F46E5;
  --primary-hover: #4338CA;
  --secondary: #10B981;
  --background: #F3F4F6;
  --surface: #FFFFFF;
  --text-main: #111827;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --danger: #EF4444;
  --radius: 16px;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}

body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
  color: var(--text-main);
  padding: 40px 20px;
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.container {
  width: 100%;
  max-width: 800px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  border: 1px solid rgba(255,255,255,0.6);
  animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

h2, h3 {
  color: var(--text-main);
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 1.5rem;
  letter-spacing: -0.02em;
}

p {
  color: var(--text-muted);
  line-height: 1.6;
}

input[type="text"], input[type="email"], input[type="tel"], select, textarea {
  width: 100%;
  padding: 16px 20px;
  margin: 8px 0 24px 0;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: #F9FAFB;
  font-family: 'Roboto', sans-serif;
  font-size: 15px;
  color: var(--text-main);
  transition: all 0.3s ease;
  box-sizing: border-box;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
  background: var(--surface);
}

button {
  width: 100%;
  padding: 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 16px;
  font-family: 'Roboto', sans-serif;
  letter-spacing: 0.5px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
  position: relative;
  overflow: hidden;
}

button:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(79, 70, 229, 0.3);
}

button:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
}

#timer-container {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  color: var(--danger);
  padding: 16px 24px;
  text-align: center;
  margin-bottom: 30px;
  font-weight: 700;
  font-size: 18px;
  position: sticky;
  top: 20px;
  z-index: 1000;
  border-radius: 50px;
  box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.15), 0 8px 10px -6px rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.3s ease;
}

#timer-container::before {
  content: '⏱';
  font-size: 22px;
}

.question-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
}

.question-block:hover {
  box-shadow: var(--shadow-md);
  border-color: #D1D5DB;
  transform: translateY(-2px);
}

.question-block b {
  font-size: 17px;
  color: var(--text-main);
  display: block;
  margin-bottom: 12px;
  line-height: 1.6;
}

.question-desc {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 20px;
  line-height: 1.6;
  background: #F9FAFB;
  padding: 12px 16px;
  border-radius: 8px;
  border-left: 3px solid var(--primary);
}

.option-label {
  display: flex;
  align-items: center;
  background: #F9FAFB;
  padding: 16px 20px;
  margin: 10px 0;
  border-radius: 12px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 500;
  color: var(--text-main);
}

.option-label:hover {
  background: #F3F4F6;
  border-color: #D1D5DB;
}

.option-label input {
  margin: 0 16px 0 0;
  width: 20px;
  height: 20px;
  accent-color: var(--primary);
  cursor: pointer;
}

.option-label.selected {
  background: rgba(79, 70, 229, 0.04);
  border-color: var(--primary);
  color: var(--primary-hover);
}

.section-title {
  margin-top: 48px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(79, 70, 229, 0.2);
  color: var(--primary);
  font-size: 20px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '✦';
  color: var(--primary);
}

#loading {
  text-align: center;
  padding: 60px 20px;
  font-size: 16px;
  color: var(--text-muted);
  display: none;
  font-weight: 500;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid rgba(79, 70, 229, 0.1);
  border-left-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  margin: 0 auto 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #94a3b8;
}

.fade-in-up {
  animation: fadeInUp 0.5s ease forwards;
  opacity: 0;
  transform: translateY(20px);
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Pagination and Navigation */
.page-group { display: none; }
.page-group.active { display: block; }

.nav-buttons {
  position: fixed;
  top: 50%;
  left: 0;
  right: 0;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
  pointer-events: none;
  z-index: 1000;
  padding: 0 20px;
}

.nav-btn {
  pointer-events: auto;
  width: auto;
  background: #6B7280;
  padding: 15px 25px;
  border-radius: 50px;
  box-shadow: var(--shadow-lg);
}

.nav-btn:hover { background: #4B5563; transform: scale(1.05); }
.nav-btn.primary { background: var(--primary); }
.nav-btn.primary:hover { background: var(--primary-hover); transform: scale(1.05); }

@media (max-width: 900px) {
  .nav-buttons { padding: 0 5px; }
  .nav-btn { padding: 10px 15px; font-size: 14px; }
}

/* Palette */
#palette-container { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 24px; border: 1px solid var(--border); }
.palette-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
.palette-box { width: 36px; height: 36px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; border-radius: 8px; font-weight: 600; color: var(--text-muted); transition: all 0.2s; }
.palette-box:hover { border-color: var(--primary); color: var(--primary); }
.palette-box.answered { background-color: var(--secondary); color: white; border-color: var(--secondary); }
.palette-box.flagged { position: relative; border-color: var(--danger); background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
.palette-box.flagged::after { content: "🚩"; position: absolute; top: -10px; right: -10px; font-size: 12px; }

.flag-label { font-size: 14px; color: var(--danger); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-left: 15px; padding: 6px 12px; background: rgba(239, 68, 68, 0.05); border-radius: 50px; border: 1px solid rgba(239, 68, 68, 0.2); font-weight: 500; transition: all 0.2s; }
.flag-label:hover { background: rgba(239, 68, 68, 0.1); }

.company-logo { max-height: 60px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
</style>
